<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba de Voz - AtClass</title>
</head>
<body>
    <h1>🐯 Prueba de Síntesis de Voz con Rugidos de Tigre</h1>

    <div style="margin: 20px 0;">
        <button id="roarBtn" style="padding: 10px 20px; font-size: 16px; background: #FF9800; color: white; border: none; border-radius: 5px; cursor: pointer; margin-right: 10px;">
            🐯 Rugido de Tigre
        </button>
        <button id="testBtn" style="padding: 10px 20px; font-size: 16px; background: #6366f1; color: white; border: none; border-radius: 5px; cursor: pointer; margin-right: 10px;">
            🎵 Probar Voz
        </button>
        <button id="fullTestBtn" style="padding: 10px 20px; font-size: 16px; background: #9C27B0; color: white; border: none; border-radius: 5px; cursor: pointer;">
            🐯+🎵 Prueba Completa con Rugido
        </button>
    </div>

    <div id="info" style="margin: 20px 0; padding: 15px; background: #f0f4f8; border-radius: 5px; font-family: monospace;">
        Cargando información del sistema...
    </div>

    <div id="log" style="margin: 20px 0; padding: 15px; background: #f8f9fa; border-radius: 5px; font-family: monospace; max-height: 300px; overflow-y: auto;">
        <strong>Log de eventos:</strong><br>
    </div>

    <script>
        const infoDiv = document.getElementById('info');
        const logDiv = document.getElementById('log');
        const testBtn = document.getElementById('testBtn');
        const roarBtn = document.getElementById('roarBtn');
        const fullTestBtn = document.getElementById('fullTestBtn');
        let audioContext = null;

        function log(message) {
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML += `[${timestamp}] ${message}<br>`;
            console.log(message);
        }

        function initAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
            return audioContext;
        }

        function playTigerRoar(intensity = 1) {
            return new Promise((resolve) => {
                try {
                    const ctx = initAudioContext();
                    const duration = 0.8 + Math.random() * 0.4;
                    const now = ctx.currentTime;
                    
                    const oscillator1 = ctx.createOscillator();
                    const oscillator2 = ctx.createOscillator();
                    const oscillator3 = ctx.createOscillator();
                    const mainGain = ctx.createGain();
                    const filter = ctx.createBiquadFilter();
                    const filter2 = ctx.createBiquadFilter();
                    
                    oscillator1.type = 'sawtooth';
                    oscillator1.frequency.setValueAtTime(80 + Math.random() * 20, now);
                    oscillator1.frequency.exponentialRampToValueAtTime(150, now + 0.1);
                    oscillator1.frequency.exponentialRampToValueAtTime(60, now + duration);
                    
                    oscillator2.type = 'square';
                    oscillator2.frequency.setValueAtTime(120 + Math.random() * 30, now);
                    oscillator2.frequency.exponentialRampToValueAtTime(200, now + 0.08);
                    oscillator2.frequency.exponentialRampToValueAtTime(80, now + duration);
                    
                    oscillator3.type = 'sawtooth';
                    oscillator3.frequency.setValueAtTime(40 + Math.random() * 10, now);
                    oscillator3.frequency.exponentialRampToValueAtTime(100, now + 0.15);
                    oscillator3.frequency.exponentialRampToValueAtTime(30, now + duration);
                    
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(400, now);
                    filter.frequency.exponentialRampToValueAtTime(800, now + 0.1);
                    filter.frequency.exponentialRampToValueAtTime(200, now + duration);
                    filter.Q.value = 5;
                    
                    filter2.type = 'bandpass';
                    filter2.frequency.setValueAtTime(150, now);
                    filter2.frequency.exponentialRampToValueAtTime(300, now + 0.1);
                    filter2.frequency.exponentialRampToValueAtTime(100, now + duration);
                    filter2.Q.value = 2;
                    
                    const oscGain1 = ctx.createGain();
                    const oscGain2 = ctx.createGain();
                    const oscGain3 = ctx.createGain();
                    oscGain1.gain.setValueAtTime(0.3 * intensity, now);
                    oscGain1.gain.exponentialRampToValueAtTime(0.5 * intensity, now + 0.1);
                    oscGain1.gain.exponentialRampToValueAtTime(0.1 * intensity, now + duration * 0.7);
                    oscGain1.gain.exponentialRampToValueAtTime(0, now + duration);
                    
                    oscGain2.gain.setValueAtTime(0.2 * intensity, now);
                    oscGain2.gain.exponentialRampToValueAtTime(0.4 * intensity, now + 0.08);
                    oscGain2.gain.exponentialRampToValueAtTime(0.1 * intensity, now + duration * 0.6);
                    oscGain2.gain.exponentialRampToValueAtTime(0, now + duration);
                    
                    oscGain3.gain.setValueAtTime(0.4 * intensity, now);
                    oscGain3.gain.exponentialRampToValueAtTime(0.6 * intensity, now + 0.15);
                    oscGain3.gain.exponentialRampToValueAtTime(0.2 * intensity, now + duration * 0.5);
                    oscGain3.gain.exponentialRampToValueAtTime(0, now + duration);
                    
                    mainGain.gain.setValueAtTime(0, now);
                    mainGain.gain.linearRampToValueAtTime(0.4 * intensity, now + 0.05);
                    mainGain.gain.linearRampToValueAtTime(0.5 * intensity, now + 0.15);
                    mainGain.gain.exponentialRampToValueAtTime(0.3 * intensity, now + duration * 0.5);
                    mainGain.gain.exponentialRampToValueAtTime(0.01, now + duration);
                    
                    oscillator1.connect(oscGain1);
                    oscillator2.connect(oscGain2);
                    oscillator3.connect(oscGain3);
                    
                    oscGain1.connect(filter);
                    oscGain2.connect(filter);
                    oscGain3.connect(filter);
                    
                    filter.connect(filter2);
                    filter2.connect(mainGain);
                    
                    mainGain.connect(ctx.destination);
                    
                    oscillator1.start(now);
                    oscillator2.start(now);
                    oscillator3.start(now);
                    
                    oscillator1.stop(now + duration);
                    oscillator2.stop(now + duration);
                    oscillator3.stop(now + duration);
                    
                    setTimeout(resolve, (duration * 1000) + 100);
                } catch (e) {
                    console.error('Error playing tiger roar:', e);
                    resolve();
                }
            });
        }

        // Verificar soporte
        log('Verificando soporte de Web Speech API...');
        if ('speechSynthesis' in window) {
            log('✅ Web Speech API soportado');
        } else {
            log('❌ Web Speech API NO soportado');
            infoDiv.innerHTML = '<span style="color: red;">❌ Tu navegador NO soporta síntesis de voz</span>';
            testBtn.disabled = true;
            roarBtn.disabled = true;
            fullTestBtn.disabled = true;
            return;
        }

        const synth = window.speechSynthesis;
        let voicesLoaded = false;

        // Función para mostrar información de voces
        function showVoiceInfo() {
            const voices = synth.getVoices();
            let html = '<strong>Información del Sistema:</strong><br>';
            html += `Voces disponibles: ${voices.length}<br>`;

            if (voices.length > 0) {
                voicesLoaded = true;
                const spanishVoices = voices.filter(v => v.lang.startsWith('es'));
                html += `Voces en español: ${spanishVoices.length}<br>`;

                if (spanishVoices.length > 0) {
                    html += '<br><strong>Voces españolas disponibles:</strong><br>';
                    spanishVoices.forEach((voice, index) => {
                        html += `${index + 1}. ${voice.name} (${voice.lang})<br>`;
                    });
                } else {
                    html += '<span style="color: orange;">⚠️ No hay voces en español, se usará voz por defecto</span><br>';
                }

                html += '<br><strong>Todas las voces:</strong><br>';
                voices.slice(0, 10).forEach((voice, index) => {
                    html += `${index + 1}. ${voice.name} (${voice.lang})<br>`;
                });

                if (voices.length > 10) {
                    html += `... y ${voices.length - 10} más<br>`;
                }
            } else {
                html += '<span style="color: red;">❌ No se encontraron voces</span><br>';
            }

            infoDiv.innerHTML = html;
        }

        // Evento cuando las voces cambian
        synth.onvoiceschanged = function() {
            log('Voces cargadas/cambiadas');
            showVoiceInfo();
        };

        // Mostrar información inicial
        showVoiceInfo();

        // Forzar carga de voces
        log('Intentando forzar carga de voces...');
        const dummyUtterance = new SpeechSynthesisUtterance('test');
        synth.speak(dummyUtterance);
        synth.cancel();

        // Función de rugido
        roarBtn.addEventListener('click', function() {
            log('🐯 Reproduciendo rugido de tigre...');
            playTigerRoar(0.6).then(() => {
                log('✅ Rugido terminado');
            });
        });

        // Función de prueba
        testBtn.addEventListener('click', function() {
            log('Botón de prueba presionado');

            if (!voicesLoaded) {
                log('⚠️ Las voces aún no se han cargado completamente');
            }

            // Cancelar cualquier habla anterior
            synth.cancel();

            // Crear utterance
            const utterance = new SpeechSynthesisUtterance();
            utterance.text = 'Hola, soy Matheo el tigre. Esta es una prueba de voz para la aplicación AtClass. Si puedes oírme claramente, significa que la síntesis de voz está funcionando correctamente en tu navegador.';
            utterance.lang = 'es-ES';
            utterance.rate = 0.9;
            utterance.pitch = 1.0;
            utterance.volume = 0.85;

            // Intentar usar voz española
            const voices = synth.getVoices();
            const softVoiceKeywords = ['samantha', 'karen', 'monica', 'paulina', 'carmen', 'lucia', 
                'sofia', 'google', 'microsoft'];
            const softVoice = voices.find(v => {
                const nameLower = v.name.toLowerCase();
                return softVoiceKeywords.some(keyword => nameLower.includes(keyword)) &&
                       v.lang.startsWith('es');
            });
            const spanishVoice = softVoice || voices.find(v => v.lang.startsWith('es'));
            if (spanishVoice) {
                utterance.voice = spanishVoice;
                log(`Usando voz: ${spanishVoice.name}`);
            } else {
                log('No se encontró voz española, usando voz por defecto');
            }

            // Eventos
            utterance.onstart = () => log('🎵 Inicio de reproducción de voz');
            utterance.onend = () => log('✅ Reproducción de voz terminada');
            utterance.onerror = (error) => {
                log(`❌ Error en síntesis de voz: ${error.error}`);
                alert(`Error al reproducir voz: ${error.error}`);
            };

            log('Iniciando reproducción...');
            synth.speak(utterance);
        });

        // Función de prueba completa con rugido
        fullTestBtn.addEventListener('click', async function() {
            log('🐯+🎵 Iniciando prueba completa con rugido...');

            if (!voicesLoaded) {
                log('⚠️ Las voces aún no se han cargado completamente');
            }

            synth.cancel();

            // Primero el rugido
            await playTigerRoar(0.5);
            await new Promise(resolve => setTimeout(resolve, 200));

            // Luego la voz
            const utterance = new SpeechSynthesisUtterance();
            utterance.text = '¡Hola! Soy Matheo el tigre. ¡Bienvenido a AtClass! Vamos a aprender matemáticas juntos de forma divertida.';
            utterance.lang = 'es-ES';
            utterance.rate = 0.9;
            utterance.pitch = 1.0;
            utterance.volume = 0.85;

            const voices = synth.getVoices();
            const softVoiceKeywords = ['samantha', 'karen', 'monica', 'paulina', 'carmen', 'lucia', 
                'sofia', 'google', 'microsoft'];
            const softVoice = voices.find(v => {
                const nameLower = v.name.toLowerCase();
                return softVoiceKeywords.some(keyword => nameLower.includes(keyword)) &&
                       v.lang.startsWith('es');
            });
            const spanishVoice = softVoice || voices.find(v => v.lang.startsWith('es'));
            if (spanishVoice) {
                utterance.voice = spanishVoice;
                log(`Usando voz: ${spanishVoice.name}`);
            }

            utterance.onstart = () => log('🔊 Reproduciendo voz...');
            utterance.onend = () => {
                log('✅ Reproducción terminada');
                // Rugido al final
                setTimeout(() => {
                    playTigerRoar(0.3);
                }, 500);
            };
            utterance.onerror = (error) => {
                log(`❌ Error en síntesis de voz: ${error.error}`);
            };

            synth.speak(utterance);
        });

        // Verificar voces inmediatamente
        setTimeout(() => {
            if (!voicesLoaded) {
                log('⏳ Esperando carga de voces...');
                showVoiceInfo();
            }
        }, 1000);

        // Verificar después de 3 segundos
        setTimeout(() => {
            log('Verificación final de voces:');
            showVoiceInfo();
        }, 3000);
    </script>
</body>
