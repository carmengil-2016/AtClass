<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba Básica de Voz</title>
</head>
<body>
    <h1>🐯 Prueba de Voz de Matheo el Tigre</h1>

    <button id="roarBtn" style="padding: 15px 30px; font-size: 18px; background: #FF9800; color: white; border: none; border-radius: 5px; cursor: pointer; margin-right: 10px;">
        🐯 RUGIDO DE TIGRE
    </button>

    <button id="speakBtn" style="padding: 15px 30px; font-size: 18px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; margin-right: 10px;">
        🔊 HABLAR
    </button>
    
    <button id="speakWithRoarBtn" style="padding: 15px 30px; font-size: 18px; background: #9C27B0; color: white; border: none; border-radius: 5px; cursor: pointer;">
        🐯+🔊 HABLAR CON RUGIDO
    </button>

    <div id="status" style="margin-top: 20px; padding: 15px; background: #f0f0f0; border-radius: 5px;">
        Estado: Esperando...
    </div>

    <script>
        const btn = document.getElementById('speakBtn');
        const roarBtn = document.getElementById('roarBtn');
        const speakWithRoarBtn = document.getElementById('speakWithRoarBtn');
        const status = document.getElementById('status');
        let audioContext = null;

        function initAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
            return audioContext;
        }

        function playTigerRoar(intensity = 1) {
            return new Promise((resolve) => {
                try {
                    const ctx = initAudioContext();
                    const duration = 1.0 + Math.random() * 0.6;
                    const now = ctx.currentTime;
                    
                    const oscillator1 = ctx.createOscillator();
                    const oscillator2 = ctx.createOscillator();
                    const oscillator3 = ctx.createOscillator();
                    const mainGain = ctx.createGain();
                    const filter = ctx.createBiquadFilter();
                    const filter2 = ctx.createBiquadFilter();
                    const distortion = ctx.createWaveShaper();
                    
                    // Distortion for growl effect
                    const samples = 44100;
                    const curve = new Float32Array(samples);
                    const deg = Math.PI / 180;
                    for (let i = 0; i < samples; i++) {
                        const x = (i * 2) / samples - 1;
                        curve[i] = ((3 + 50 * intensity) * x * 20 * deg) / (Math.PI + 50 * intensity * Math.abs(x));
                    }
                    distortion.curve = curve;
                    distortion.oversample = '4x';
                    
                    oscillator1.type = 'sawtooth';
                    oscillator1.frequency.setValueAtTime(80 + Math.random() * 20, now);
                    oscillator1.frequency.exponentialRampToValueAtTime(150, now + 0.1);
                    oscillator1.frequency.exponentialRampToValueAtTime(60, now + duration);
                    
                    oscillator2.type = 'square';
                    oscillator2.frequency.setValueAtTime(120 + Math.random() * 30, now);
                    oscillator2.frequency.exponentialRampToValueAtTime(200, now + 0.08);
                    oscillator2.frequency.exponentialRampToValueAtTime(80, now + duration);
                    
                    oscillator3.type = 'sawtooth';
                    oscillator3.frequency.setValueAtTime(40 + Math.random() * 10, now);
                    oscillator3.frequency.exponentialRampToValueAtTime(100, now + 0.15);
                    oscillator3.frequency.exponentialRampToValueAtTime(30, now + duration);
                    
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(400, now);
                    filter.frequency.exponentialRampToValueAtTime(800, now + 0.1);
                    filter.frequency.exponentialRampToValueAtTime(200, now + duration);
                    filter.Q.value = 5;
                    
                    filter2.type = 'bandpass';
                    filter2.frequency.setValueAtTime(150, now);
                    filter2.frequency.exponentialRampToValueAtTime(300, now + 0.1);
                    filter2.frequency.exponentialRampToValueAtTime(100, now + duration);
                    filter2.Q.value = 2;
                    
                    const oscGain1 = ctx.createGain();
                    const oscGain2 = ctx.createGain();
                    const oscGain3 = ctx.createGain();
                    oscGain1.gain.setValueAtTime(0.3 * intensity, now);
                    oscGain1.gain.exponentialRampToValueAtTime(0.5 * intensity, now + 0.1);
                    oscGain1.gain.exponentialRampToValueAtTime(0.1 * intensity, now + duration * 0.7);
                    oscGain1.gain.exponentialRampToValueAtTime(0, now + duration);
                    
                    oscGain2.gain.setValueAtTime(0.2 * intensity, now);
                    oscGain2.gain.exponentialRampToValueAtTime(0.4 * intensity, now + 0.08);
                    oscGain2.gain.exponentialRampToValueAtTime(0.1 * intensity, now + duration * 0.6);
                    oscGain2.gain.exponentialRampToValueAtTime(0, now + duration);
                    
                    oscGain3.gain.setValueAtTime(0.4 * intensity, now);
                    oscGain3.gain.exponentialRampToValueAtTime(0.6 * intensity, now + 0.15);
                    oscGain3.gain.exponentialRampToValueAtTime(0.2 * intensity, now + duration * 0.5);
                    oscGain3.gain.exponentialRampToValueAtTime(0, now + duration);
                    
                    mainGain.gain.setValueAtTime(0, now);
                    mainGain.gain.linearRampToValueAtTime(0.4 * intensity, now + 0.05);
                    mainGain.gain.linearRampToValueAtTime(0.5 * intensity, now + 0.15);
                    mainGain.gain.exponentialRampToValueAtTime(0.3 * intensity, now + duration * 0.5);
                    mainGain.gain.exponentialRampToValueAtTime(0.01, now + duration);
                    
                    oscillator1.connect(oscGain1);
                    oscillator2.connect(oscGain2);
                    oscillator3.connect(oscGain3);
                    
                    oscGain1.connect(filter);
                    oscGain2.connect(filter);
                    oscGain3.connect(filter);
                    
                    filter.connect(filter2);
                    filter2.connect(distortion);
                    distortion.connect(mainGain);
                    
                    mainGain.connect(ctx.destination);
                    
                    oscillator1.start(now);
                    oscillator2.start(now);
                    oscillator3.start(now);
                    
                    oscillator1.stop(now + duration);
                    oscillator2.stop(now + duration);
                    oscillator3.stop(now + duration);
                    
                    setTimeout(resolve, (duration * 1000) + 100);
                } catch (e) {
                    console.error('Error playing tiger roar:', e);
                    resolve();
                }
            });
        }

        function updateStatus(message, color = 'black') {
            status.innerHTML = message;
            status.style.color = color;
            console.log(message);
        }

        // Verificar soporte básico
        updateStatus('Verificando soporte de Web Speech API...');

        if (!('speechSynthesis' in window)) {
            updateStatus('❌ ERROR: Tu navegador NO soporta Web Speech API', 'red');
            btn.disabled = true;
            roarBtn.disabled = true;
            speakWithRoarBtn.disabled = true;
            return;
        }

        updateStatus('✅ Web Speech API soportado', 'green');

        // Intentar obtener voces inmediatamente
        let voices = speechSynthesis.getVoices();
        updateStatus(`Voces encontradas inmediatamente: ${voices.length}`);

        // Configurar evento de cambio de voces
        speechSynthesis.onvoiceschanged = function() {
            voices = speechSynthesis.getVoices();
            updateStatus(`🔄 Voces cargadas: ${voices.length}`, 'blue');

            if (voices.length > 0) {
                const spanishVoices = voices.filter(v => v.lang.startsWith('es'));
                updateStatus(`🇪🇸 Voces en español: ${spanishVoices.length}`, 'green');

                if (spanishVoices.length > 0) {
                    updateStatus(`✅ ¡Voces españolas disponibles! (${spanishVoices.map(v => v.name).join(', ')})`, 'green');
                }
            }
        };

        // Función de rugido
        roarBtn.addEventListener('click', function() {
            updateStatus('🐯 Reproduciendo rugido de tigre...', 'orange');
            playTigerRoar(0.5).then(() => {
                updateStatus('✅ Rugido terminado', 'green');
            });
        });

        // Función de hablar (voz de tigre)
        btn.addEventListener('click', async function() {
            updateStatus('🐯 Reproduciendo rugido inicial...', 'orange');
            await playTigerRoar(0.6);
            
            await new Promise(resolve => setTimeout(resolve, 300));
            
            updateStatus('🎵 Reproduciendo voz de tigre...', 'orange');

            // Crear utterance con voz de tigre
            const utterance = new SpeechSynthesisUtterance();
            utterance.text = 'Rrrr... Hola, soy Matheo el tigre. Rrrr... Esta es una prueba de voz. Si puedes oírme claramente, significa que la síntesis de voz está funcionando correctamente. Rrrr...';
            utterance.lang = 'es-ES';
            utterance.rate = 0.75;  // Más lento
            utterance.pitch = 0.6;  // Mucho más grave
            utterance.volume = 0.8;

            // Eventos
            utterance.onstart = () => updateStatus('🔊 Reproduciendo voz de tigre...', 'green');
            utterance.onend = () => {
                updateStatus('✅ Reproducción terminada', 'green');
                // Rugido final
                setTimeout(() => playTigerRoar(0.5), 300);
            };
            utterance.onerror = (e) => {
                updateStatus(`❌ Error: ${e.error}`, 'red');
                console.error('Speech error:', e);
            };

            // Buscar voz española
            voices = speechSynthesis.getVoices();
            const softVoiceKeywords = ['samantha', 'karen', 'monica', 'paulina', 'carmen', 'lucia', 
                'sofia', 'google', 'microsoft'];
            const softVoice = voices.find(v => {
                const nameLower = v.name.toLowerCase();
                return softVoiceKeywords.some(keyword => nameLower.includes(keyword)) &&
                       v.lang.startsWith('es');
            });
            
            const spanishVoice = softVoice || voices.find(v => v.lang.startsWith('es'));
            if (spanishVoice) {
                utterance.voice = spanishVoice;
                updateStatus(`🎯 Usando voz: ${spanishVoice.name}`, 'blue');
            }

            try {
                speechSynthesis.speak(utterance);
            } catch (error) {
                updateStatus(`❌ Error al iniciar voz: ${error.message}`, 'red');
            }
        });

        // Función de hablar con rugido completo
        speakWithRoarBtn.addEventListener('click', async function() {
            updateStatus('🐯 Reproduciendo rugido potente...', 'orange');
            await playTigerRoar(0.8);
            
            await new Promise(resolve => setTimeout(resolve, 300));
            
            updateStatus('🎵 Reproduciendo voz de tigre con rugidos...', 'orange');

            const utterance = new SpeechSynthesisUtterance();
            utterance.text = '¡Rrrr! ¡Hola! Soy Matheo el tigre. ¡Rrrr! ¡Bienvenido a AtClass! Vamos a aprender matemáticas juntos de forma divertida. ¡Rrrr!';
            utterance.lang = 'es-ES';
            utterance.rate = 0.7;  // Más lento
            utterance.pitch = 0.5;  // Muy grave
            utterance.volume = 0.75;

            utterance.onstart = () => updateStatus('🔊 Reproduciendo voz de tigre...', 'green');
            utterance.onend = () => {
                updateStatus('✅ Reproducción terminada', 'green');
                // Rugido final potente
                setTimeout(() => playTigerRoar(0.7), 500);
            };
            utterance.onerror = (e) => {
                updateStatus(`❌ Error: ${e.error}`, 'red');
            };

            voices = speechSynthesis.getVoices();
            const softVoiceKeywords = ['samantha', 'karen', 'monica', 'paulina', 'carmen', 'lucia', 
                'sofia', 'google', 'microsoft'];
            const softVoice = voices.find(v => {
                const nameLower = v.name.toLowerCase();
                return softVoiceKeywords.some(keyword => nameLower.includes(keyword)) &&
                       v.lang.startsWith('es');
            });
            const spanishVoice = softVoice || voices.find(v => v.lang.startsWith('es'));
            if (spanishVoice) {
                utterance.voice = spanishVoice;
            }

            try {
                speechSynthesis.speak(utterance);
            } catch (error) {
                updateStatus(`❌ Error al iniciar voz: ${error.message}`, 'red');
            }
        });

        // Verificar voces después de un tiempo
        setTimeout(() => {
            voices = speechSynthesis.getVoices();
            updateStatus(`⏱️ Verificación final: ${voices.length} voces disponibles`);

            if (voices.length === 0) {
                updateStatus('⚠️ ADVERTENCIA: No se encontraron voces. Puede que necesites reiniciar el navegador o instalar voces adicionales.', 'orange');
            }
        }, 3000);
    </script>
</body>
</html></content>
